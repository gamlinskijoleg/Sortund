name: Deploy Backend to Server

on:
    workflow_dispatch:
    push:
        branches: [main]
        paths:
            - "apps/backend/**"
            - "packages/**"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - "tsconfig.base.json"

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # 1. Connect to Tailscale network via OAuth
            - name: Connect to Tailscale
              uses: tailscale/github-action@v4
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                  tags: tag:ci

            # 2. Set up the Buildx engine with the correct driver for caching
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            # 3. Login to Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            # 4. Build and push image to Docker Hub
            #    context is the repo root so pnpm workspace deps are available
            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./apps/backend/Dockerfile
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/sortund-backend:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # 5. Test connectivity to server
            - name: Test Ping to Server
              run: ping -c 4 ${{ secrets.SERVER_IP }}

            # 6. Deploy to server via SSH (inside Tailscale tunnel)
            - name: Deploy via SSH
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_IP }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      # ── Network ────────────────────────────────────────────────
                      docker network create sortund-net || true

                      # ── Postgres (only start if not already running) ────────────
                      if ! docker ps --format '{{.Names}}' | grep -q '^sortund-postgres$'; then
                          docker rm sortund-postgres 2>/dev/null || true
                          docker run -d \
                          --name sortund-postgres \
                          --network sortund-net \
                          -e POSTGRES_USER=postgres \
                          -e POSTGRES_PASSWORD="${{ secrets.BACKEND_DB_PASSWORD }}" \
                          -e POSTGRES_DB=sortund \
                          -v sortund-pgdata:/var/lib/postgresql/data \
                          --restart unless-stopped \
                          postgres:17-alpine
                          echo "Waiting for Postgres to be ready..."
                          sleep 5
                      else
                          echo "Postgres already running, skipping."
                      fi

                      # ── Backend ────────────────────────────────────────────────
                      docker stop sortund-backend || true
                      docker rm sortund-backend || true
                      docker run -d \
                      --name sortund-backend \
                      --network sortund-net \
                      --pull always \
                      -p 3000:3000 \
                      -e NODE_ENV=production \
                      -e DATABASE_URL="postgresql://postgres:${{ secrets.BACKEND_DB_PASSWORD }}@sortund-postgres:5432/sortund" \
                      -e JWT_SECRET="${{ secrets.BACKEND_JWT_SECRET }}" \
                      -e JWT_EXPIRES_IN="${{ secrets.BACKEND_JWT_EXPIRES_IN }}" \
                      -e JWT_REFRESH_SECRET="${{ secrets.BACKEND_JWT_REFRESH_SECRET }}" \
                      -e JWT_REFRESH_EXPIRES_IN="${{ secrets.BACKEND_JWT_REFRESH_EXPIRES_IN }}" \
                      --restart unless-stopped \
                      ${{ secrets.DOCKERHUB_USERNAME }}/sortund-backend:latest

            # 7. Cleanup Tailscale connection
            - name: Disconnect Tailscale
              if: always()
              run: sudo tailscale logout
