name: Deploy to Server

on:
    push:
        branches: [main]
        paths:
            - "apps/ai-worker/**"

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # 1. Підключаємося до вашої мережі Tailscale
            - name: Connect to Tailscale
              uses: tailscale/github-action@v2
              with:
                  authkey: ${{ secrets.TS_API_KEY }}

            # 2. Логін в Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            # 3. Збірка і пуш образу в Docker Hub
            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: ./apps/ai-worker
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-worker:latest

            - name: Test Ping to Server
              run: ping -c 4 ${{ secrets.SERVER_IP }}

            # 4. Деплой на сервер через SSH (всередині тунелю Tailscale)
            - name: Deploy via SSH
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  SERVER_IP: ${{ secrets.SERVER_IP }}
                  SERVER_USER: ${{ secrets.SERVER_USER }}
              run: |
                  mkdir -p ~/.ssh
                  echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $SERVER_USER@$SERVER_IP "docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }} && docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ai-worker:latest && docker stop ai-worker || true && docker rm ai-worker || true && docker run -d --name ai-worker -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/ai-worker:latest"
