name: Deploy to Server

on:
    push:
        branches: [main]
        paths:
            - "apps/ai-worker/**"

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # 1. Логін в Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            # 2. Збірка і пуш образу
            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: ./apps/ai-worker
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-worker:latest

            # 3. Команда серверу оновитися
            - name: Deploy via SSH
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_IP }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  # Використовуємо --strict-host-key-checking=no, щоб уникнути помилок SSH
                  script: |
                      echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
                      docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ai-worker:latest
                      docker stop ai-worker || true
                      docker rm ai-worker || true
                      docker run -d --name ai-worker -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/ai-worker:latest
