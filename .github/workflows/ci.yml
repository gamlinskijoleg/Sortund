name: CI

on:
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    ci:
        name: Run tests, linting, and typechecking
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Install pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Setup uv (for Python)
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
                  cache-dependency-glob: "apps/ai-worker/uv.lock"

            - name: Install Python
              run: uv python install

            - name: Install Node dependencies
              run: pnpm install --frozen-lockfile

            - name: Install System Dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libsndfile1 ffmpeg libasound2-dev

            - name: Run Linting
              run: pnpm lint

            - name: Run Typechecking
              run: pnpm check-types

            - name: Run Tests
              run: pnpm test
