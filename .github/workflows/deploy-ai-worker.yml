name: Deploy to Server

on:
    push:
        branches: [main]
        paths:
            - "apps/ai-worker/**"

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # 1. Логін в приватний реєстр GitHub
            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # 2. Збірка і пуш образу
            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: ./apps/ai-worker
                  push: true
                  tags: ghcr.io/gamlinskijoleg/ai-worker:latest

            # 3. Команда серверу оновитися
            - name: Deploy via SSH
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_IP }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
                      docker pull ghcr.io/${{ github.repository_owner }}/ai-worker:latest
                      docker stop ai-worker || true
                      docker rm ai-worker || true
                      docker run -d --name ai-worker -p 8000:8000 --restart unless-stopped ghcr.io/${{ github.repository_owner }}/ai-worker:latest
