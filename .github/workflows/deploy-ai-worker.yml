name: Deploy to Server

on:
    workflow_dispatch:
    push:
        branches: [main]
        paths:
            - "apps/ai-worker/**"

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # 1. Connect to Tailscale network via OAuth
            - name: Connect to Tailscale
              uses: tailscale/github-action@v2
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                  tags: tag:ci

            # 2. Login to Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            # 3. Build and push image to Docker Hub
            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: ./apps/ai-worker
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-worker:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Test Ping to Server
              run: ping -c 4 ${{ secrets.SERVER_IP }}

            # 4. Deploy to server via SSH (inside Tailscale tunnel)
            - name: Deploy via SSH
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_IP }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      docker stop ai-worker || true
                      docker rm ai-worker || true
                      docker run -d \
                      --name ai-worker \
                      --pull always \
                      -p 8000:8000 \
                      -e HUGGING_FACE_HUB_TOKEN="${{ secrets.HF_TOKEN }}" \
                      --restart unless-stopped \
                      ${{ secrets.DOCKERHUB_USERNAME }}/ai-worker:latest

            # 5. Cleanup Tailscale connection
            - name: Disconnect Tailscale
              if: always()
              run: sudo tailscale logout
